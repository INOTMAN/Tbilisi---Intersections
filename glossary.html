<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glossary — Tbilisi Intersections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #111; color: #eee; min-height: 100vh; }

    .header {
      background: #111;
      border-bottom: 3px solid #000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.8);
      padding: 0.8rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header-logo { font-size: 1.3rem; font-weight: 800; color: #43a047; letter-spacing: -0.02em; }
    .header-logo span { color: #fdd835; }
    .back-btn {
      margin-left: auto;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: #e53935; color: #fff; }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    /* ── CATEGORY SELECTION ── */
    #categoryView { display: block; }
    #termView { display: none; }

    .page-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fdd835;
      margin-bottom: 0.4rem;
    }
    .page-sub {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 2.5rem;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      margin-top: 1rem;
    }
    @media (max-width: 600px) {
      .category-grid { grid-template-columns: 1fr; }
    }

    .cat-card {
      background: #1a1a1a;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .cat-card:hover {
      border-color: #fdd835;
      background: #222;
      transform: translateY(-3px);
    }
    .cat-icon {
      font-size: 2.4rem;
      margin-bottom: 1rem;
    }
    .cat-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fdd835;
      margin-bottom: 0.4rem;
    }
    .cat-count {
      font-size: 0.72rem;
      color: #555;
    }

    /* ── TERM VIEW ── */
    .term-view-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.8rem;
    }
    .term-view-back {
      background: none;
      border: 1px solid #333;
      color: #aaa;
      padding: 0.35rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .term-view-back:hover { border-color: #fdd835; color: #fdd835; }
    .term-view-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fdd835;
    }

    .search-box {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: #eee;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      margin-bottom: 1.5rem;
      outline: none;
    }
    .search-box:focus { border-color: #e53935; }
    .search-box::placeholder { color: #444; }

    .term-card {
      background: #1a1a1a;
      border: 1px solid #222;
      border-left: 3px solid #333;
      border-radius: 8px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.8rem;
      transition: border-color 0.2s;
    }
    .term-card:hover { border-left-color: #fdd835; }
    .term-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fdd835;
      margin-bottom: 0.35rem;
    }
    .term-def {
      font-size: 0.82rem;
      color: #aaa;
      line-height: 1.6;
    }
    .term-card.hidden { display: none; }
    .term-card.highlighted { border-left-color: #e53935; background: #1e1212; }

    .no-results {
      color: #444;
      font-size: 0.85rem;
      text-align: center;
      padding: 2rem;
      display: none;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">TBILISI <span>INTERSECTIONS</span></div>
  </div>
  <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Map</a>
</div>

<div class="container">

  <!-- ── CATEGORY SELECTION VIEW ── -->
  <div id="categoryView">
    <div class="page-title">Glossary</div>
    <div class="page-sub">Select a category to see definitions of terms used in the inventory system.</div>

    <div class="category-grid">
      <div class="cat-card" onclick="openCategory('general')">
        <div class="cat-icon">🗺️</div>
        <div class="cat-title">General</div>
        <div class="cat-count">4 terms</div>
      </div>
      <div class="cat-card" onclick="openCategory('approaches')">
        <div class="cat-icon">🛣️</div>
        <div class="cat-title">Approaches</div>
        <div class="cat-count">18 terms</div>
      </div>
      <div class="cat-card" onclick="openCategory('lights')">
        <div class="cat-icon">🚦</div>
        <div class="cat-title">Traffic Lights</div>
        <div class="cat-count">19 terms</div>
      </div>
    </div>
  </div>

  <!-- ── TERM VIEW ── -->
  <div id="termView">
    <div class="term-view-header">
      <button class="term-view-back" onclick="backToCategories()"><i class="fa-solid fa-arrow-left"></i> Categories</button>
      <div class="term-view-title" id="termViewTitle"></div>
    </div>
    <input type="text" class="search-box" placeholder="Search terms..." oninput="filterTerms(this.value)" />
    <div id="noResults" class="no-results">No terms found.</div>
    <div id="termList"></div>
  </div>

</div>

<script>
  const TERMS = {
    general: {
      title: 'General',
      icon: '🗺️',
      terms: [
        { name: 'Intersection', def: 'A point where two or more roads meet and traffic flows are controlled by traffic signals. Each intersection in this system is identified by a unique code (e.g. VAK2-016).' },
        { name: 'Intersection Code', def: 'A unique identifier assigned to each signalized intersection. The prefix indicates the district (e.g. VAK = Vake, CHU = Chughureti, NAD = Nadzaladevi) and the number identifies the specific intersection within that district.' },
        { name: 'Status', def: 'The operational condition of the intersection at the time of survey. Possible values: Fully Operational, Partially Operational, Not Operational.' },
        { name: 'Survey Date', def: 'The date on which the intersection was physically inspected and its data was recorded in the field.' },
      ]
    },
    approaches: {
      title: 'Approaches',
      icon: '🛣️',
      terms: [
        { name: 'Approach', def: 'A single road arm entering or exiting the intersection. Most intersections have 3–4 approaches. Each approach is numbered and described separately.' },
        { name: 'Direction (Dir)', def: 'The direction of traffic flow on the approach. I = Inbound (entering the intersection), O = Outbound (leaving the intersection), I/O = both directions on the same arm.' },
        { name: 'Width', def: 'The total carriageway width of the approach in meters, measured at the stop line.' },
        { name: 'Traffic Lanes', def: 'The number of lanes dedicated to general motor vehicle traffic on the approach.' },
        { name: 'Turning', def: 'Lane turning configuration. Encoded as a combination of lane count and direction: S = straight, L = left turn, R = right turn. Example: 2s1r means 2 straight lanes and 1 right-turn lane.' },
        { name: 'Bus Lane', def: 'Number of lanes exclusively designated for buses on the approach.' },
        { name: 'Bike Lane', def: 'A marked lane on the carriageway reserved for cyclists, separated from motor traffic by a painted line.' },
        { name: 'Bikeway', def: 'A physically separated cycling path, elevated or protected from motor traffic (as opposed to a painted bike lane).' },
        { name: 'Parking', def: 'Number of parking spaces present on the approach near the intersection.' },
        { name: 'Buffer', def: 'A physical separation zone (e.g. median strip, bollards, raised kerb) between opposing traffic flows or between traffic and cyclists/pedestrians.' },
        { name: 'TC (Traffic Cabinet)', def: 'Presence of a traffic signal controller cabinet on the approach. Value 1 = present.' },
        { name: 'Power', def: 'Indicates whether a power connection is present at the approach for the traffic signal system.' },
        { name: 'Internet', def: 'Indicates whether a data/internet connection is present at the approach for remote monitoring or adaptive signal control.' },
        { name: 'Power Demand (Pwr Dem)', def: 'Indicates whether a power supply upgrade or new connection is required at this approach.' },
        { name: 'Internet Demand (Int Dem)', def: 'Indicates whether a new or upgraded internet connection is required at this approach.' },
        { name: 'Railing', def: 'Pedestrian guard railing present on the approach, used to direct pedestrian flow to designated crossing points.' },
        { name: 'Bus Stop', def: 'Number of bus stops located on the approach near the intersection.' },
        { name: 'Shelter', def: 'Number of covered bus/waiting shelters at stops on the approach.' },
        { name: 'Ad Panel', def: 'Number of advertising panels (billboards or display frames) present on the approach.' },
        { name: 'Panel Dim (Panel Dimensions)', def: 'Size of the advertising panel in square meters or standard format (e.g. 6 = 6m²).' },
      ]
    },
    lights: {
      title: 'Traffic Lights',
      icon: '🚦',
      terms: [
        { name: 'Traffic Light (Signal Head)', def: 'An individual signal pole or mast at the intersection. Each is identified by a code consisting of a type prefix, intersection number, and pole number (e.g. CP129-3 = pole 3 of intersection 129, type CP).' },
        { name: 'CP (Controller Pole)', def: 'A main signal pole carrying full-size traffic signal heads for vehicle traffic, typically 22cm diameter lenses.' },
        { name: 'SP (Secondary Pole)', def: 'A smaller signal pole, typically carrying vehicle or pedestrian signal heads with smaller diameter lenses (10cm).' },
        { name: 'PP (Pedestrian Pole)', def: 'A pole dedicated to pedestrian signal heads (walk/don\'t walk), usually 9cm diameter lenses mounted at a lower height.' },
        { name: 'Diameter', def: 'The diameter of the signal lens in centimeters. Standard sizes: 22cm (vehicle), 10cm (vehicle/secondary), 9cm (pedestrian).' },
        { name: 'Height', def: 'The mounting height of the signal head above ground level, in meters.' },
        { name: 'Length (Cantilever)', def: 'The horizontal arm length of the signal pole in meters, used when the signal head is projected over the carriageway.' },
        { name: 'Traffic Signals', def: 'Number of vehicle traffic signal heads mounted on this pole.' },
        { name: 'Pedestrian Signals', def: 'Number of pedestrian signal heads (walk/don\'t walk indicators) mounted on this pole.' },
        { name: 'Cycling Signals', def: 'Number of signal heads specifically designed for cyclists mounted on this pole.' },
        { name: 'Single Red / Yellow / Green', def: 'Number of single-colour signal heads (one lens only) for red, yellow, or green. Used in supplementary or special-purpose applications.' },
        { name: 'Countdown', def: 'Presence of a countdown timer display on the pole showing remaining seconds of the current phase.' },
        { name: 'Forward / Right / Left (Arrow)', def: 'Number of directional arrow signal heads (green arrows) indicating permitted movement directions: forward, right turn, or left turn.' },
        { name: 'Bus Signal', def: 'Number of signal heads specifically for bus priority (tram/bus phase indicators).' },
        { name: 'Camera', def: 'Number of cameras mounted on the pole. May include enforcement cameras (red-light), traffic monitoring, or CCTV.' },
        { name: 'Detector', def: 'Presence of a vehicle or pedestrian detector on the pole (e.g. loop detector, push button trigger). Used for demand-responsive signal control.' },
        { name: 'Acoustic Signal', def: 'Presence of an audible signal device (beeper or voice message) for visually impaired pedestrians.' },
        { name: 'Button', def: 'Presence of a pedestrian push button to request a crossing phase.' },
        { name: 'Sunshade', def: 'Number of sun visors (hoods) fitted to signal heads to improve visibility in bright conditions.' },
      ]
    }
  };

  function openCategory(key, highlight) {
    const cat = TERMS[key];
    document.getElementById('categoryView').style.display = 'none';
    document.getElementById('termView').style.display = 'block';
    document.getElementById('termViewTitle').textContent = cat.icon + '  ' + cat.title;
    document.querySelector('.search-box').value = '';
    renderTerms(cat.terms, highlight);
  }

  // Deep link: glossary.html?cat=approaches&term=Turning
  (function() {
    const p = new URLSearchParams(location.search);
    const cat = p.get('cat');
    const term = p.get('term');
    if (cat && TERMS[cat]) openCategory(cat, term);
  })();

  function renderTerms(terms, highlight) {
    document.getElementById('termList').innerHTML = terms.map(t => `
      <div class="term-card${highlight && t.name.toLowerCase()===highlight.toLowerCase() ? ' highlighted' : ''}" id="term-${t.name.replace(/\s+/g,'_')}">
        <div class="term-name">${t.name}</div>
        <div class="term-def">${t.def}</div>
      </div>`).join('');
    document.getElementById('noResults').style.display = 'none';
    if (highlight) {
      setTimeout(() => {
        const el = document.querySelector('.term-card.highlighted');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  }

  function backToCategories() {
    document.getElementById('termView').style.display = 'none';
    document.getElementById('categoryView').style.display = 'block';
    document.querySelector('.search-box').value = '';
  }

  function filterTerms(val) {
    const q = val.trim().toLowerCase();
    const cards = document.querySelectorAll('#termList .term-card');
    let visible = 0;
    cards.forEach(card => {
      const match = !q || card.querySelector('.term-name').textContent.toLowerCase().includes(q)
                       || card.querySelector('.term-def').textContent.toLowerCase().includes(q);
      card.classList.toggle('hidden', !match);
      if (match) visible++;
    });
    document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
  }
</script>

</body>
</html>
