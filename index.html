<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tbilisi Intersections Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f1a12; color: #eee; height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    .header {
      background: #0f1a12;
      border-bottom: 2px solid #2d7a4f;
      padding: 0.8rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 1000;
    }
    .header-logo { font-size: 1.3rem; font-weight: 800; color: #4caf6e; letter-spacing: -0.02em; }
    .header-logo span { color: #c8e000; }
    .header-sub { font-size: 0.75rem; color: #888; margin-top: 0.1rem; }
    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 1.5rem;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 1.2rem; font-weight: 800; color: #c8e000; }
    .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 0.1em; }

    /* LAYOUT */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* MAP */
    #map { flex: 1; height: 100%; }

    /* SIDEBAR */
    .sidebar {
      width: 520px;
      background: #141f16;
      border-left: 2px solid #2d7a4f;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.3s;
    }
    .sidebar.hidden { width: 0; border: none; }

    .sidebar-header {
      background: #1a2e1e;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #2d7a4f;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .sidebar-id {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c8e000;
      margin-bottom: 0.3rem;
    }
    .sidebar-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }
    .sidebar-close {
      background: none;
      border: 1px solid #444;
      color: #aaa;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .sidebar-close:hover { background: #333; color: #fff; }

    .sidebar-tabs {
      display: flex;
      background: #0f1a12;
      border-bottom: 1px solid #2d4a2f;
    }
    .stab {
      flex: 1;
      padding: 0.6rem 0.4rem;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #777;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .stab.active { color: #c8e000; border-bottom-color: #c8e000; }
    .stab:hover { color: #eee; }

    .sidebar-body { flex: 1; overflow-y: auto; padding: 1rem; }
    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-track { background: #141f16; }
    .sidebar-body::-webkit-scrollbar-thumb { background: #2d7a4f; border-radius: 2px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* INFO CARDS */
    .info-card {
      background: #1a2e1e;
      border: 1px solid #2d4a2f;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .info-card-title {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4caf6e;
      margin-bottom: 0.6rem;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0;
      border-bottom: 1px solid #243828;
      font-size: 0.8rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: #888; }
    .info-val { color: #eee; font-weight: 500; text-align: right; max-width: 60%; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 700;
    }
    .badge-green { background: #1a4a2a; color: #4caf6e; }
    .badge-yellow { background: #2a2a00; color: #c8e000; }
    .badge-blue { background: #0a1a3a; color: #5b9cf6; }

    /* APPROACHES TABLE */
    .approaches-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 0.5rem; }
    .approaches-table th {
      background: #0f1a12;
      color: #4caf6e;
      padding: 0.4rem 0.5rem;
      text-align: left;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #2d4a2f;
    }
    .approaches-table td {
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid #1e3020;
      color: #ccc;
    }
    .approaches-table tr:last-child td { border-bottom: none; }
    .approaches-table tr:hover td { background: #1a2e1e; }

    /* TRAFFIC LIGHTS TABLE */
    .tl-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    .tl-table th {
      background: #0f1a12;
      color: #c8e000;
      padding: 0.35rem 0.4rem;
      text-align: center;
      font-size: 0.55rem;
      text-transform: uppercase;
      border-bottom: 1px solid #2d4a2f;
    }
    .tl-table td {
      padding: 0.35rem 0.4rem;
      border-bottom: 1px solid #1e3020;
      color: #ccc;
      text-align: center;
    }
    .tl-table tr:last-child td { border-bottom: none; }
    .check { color: #4caf6e; }
    .dash { color: #444; }

    /* CLICKABLE TL NAME */
    .tl-name-btn {
      cursor: pointer;
      color: #5b9cf6;
      text-decoration: underline dotted;
      font-weight: 700;
      white-space: nowrap;
    }
    .tl-name-btn:hover { color: #8bbfff; }

    /* TL POLE MARKER ON MAP */
    .tl-pole-marker {
      width: 22px; height: 22px;
      background: #5b9cf6;
      border: 2px solid #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 0 rgba(91,156,246,0.7);
      animation: tlpulse 1.8s infinite;
    }
    @keyframes tlpulse {
      0%   { box-shadow: 0 0 0 0 rgba(91,156,246,0.7); }
      70%  { box-shadow: 0 0 0 12px rgba(91,156,246,0); }
      100% { box-shadow: 0 0 0 0 rgba(91,156,246,0); }
    }

    /* FILES */
    .file-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #1a2e1e;
      border: 1px solid #2d4a2f;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      color: #eee;
      transition: all 0.2s;
    }
    .file-btn:hover { background: #243828; border-color: #4caf6e; }
    .file-icon { font-size: 1.4rem; }
    .file-info { flex: 1; }
    .file-name { font-size: 0.82rem; font-weight: 600; }
    .file-type { font-size: 0.65rem; color: #888; margin-top: 0.1rem; }
    .file-arrow { color: #4caf6e; font-size: 1rem; }

    /* EMPTY PANEL */
    .empty-panel {
      text-align: center;
      padding: 2rem 1rem;
      color: #555;
    }
    .empty-panel .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .empty-panel p { font-size: 0.8rem; line-height: 1.5; }

    /* PLACEHOLDER */
    .no-selection {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 2rem;
      color: #555;
    }
    .no-selection .icon { font-size: 3rem; margin-bottom: 1rem; }
    .no-selection h3 { font-size: 1rem; color: #888; margin-bottom: 0.5rem; }
    .no-selection p { font-size: 0.8rem; line-height: 1.6; }


    /* LEAFLET CUSTOM MARKER */
    .custom-marker {
      background: #c8e000;
      color: #0f1a12;
      border-radius: 50%;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.65rem;
      border: 2px solid #0f1a12;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    .custom-marker.operational { background: #c8e000; }
    .custom-marker.partial { background: #ff9800; }
    .custom-marker.inactive { background: #f44336; }

@media (max-width: 768px) {
      .sidebar { width: 100%; position: absolute; bottom: 0; left: 0; right: 0; height: 60vh; border-left: none; border-top: 2px solid #2d7a4f; z-index: 500; }
      .sidebar.hidden { height: 0; }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-logo">Tbilisi <span>Intersections</span></div>
      <div class="header-sub">Traffic Infrastructure Inventory System</div>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Loaded</div></div>
      <div class="stat"><div class="stat-num" id="statOp">—</div><div class="stat-label">Operational</div></div>
      <div class="stat"><div class="stat-num">2025</div><div class="stat-label">Survey Year</div></div>
    </div>
  </div>

  <div class="main">

    <!-- MAP -->
    <div id="map"></div>

    <!-- SIDEBAR -->
    <div class="sidebar hidden" id="sidebar">
      <div id="sidebarContent">
        <div class="no-selection">
          <div class="icon">📍</div>
          <h3>Select an Intersection</h3>
          <p>Click any marker on the map to view detailed inventory data.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="tl_coords.js"></script>
  <script>
    // ── MAP SETUP ──────────────────────────────────────────────────
    const map = L.map('map', { zoomControl: true }).setView([41.7033, 44.8054], 14);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // ── MARKERS ────────────────────────────────────────────────────
    const markerMap = {};
    document.getElementById('statTotal').textContent = INTERSECTIONS.length;
    document.getElementById('statOp').textContent = INTERSECTIONS.filter(i => i.status === 'Fully Operational').length;

    INTERSECTIONS.forEach(inter => {
      const statusClass = inter.status === 'Fully Operational' ? 'operational'
                        : inter.status === 'Partially Operational' ? 'partial' : 'inactive';

      const icon = L.divIcon({
        html: `<div class="custom-marker ${statusClass}">${inter.code.split('-')[1]}</div>`,
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });

      const marker = L.marker([inter.lat, inter.lng], { icon }).addTo(map);
      markerMap[inter.code] = marker;
      marker.on('click', () => { openSidebar(inter); map.setView([inter.lat, inter.lng], 17); });
    });

    // ── TRAFFIC LIGHT LOCATOR ──────────────────────────────────────
    let activeTLMarker = null;

    function showTrafficLight(name) {
      if (activeTLMarker) { map.removeLayer(activeTLMarker); activeTLMarker = null; }
      const coord = TL_COORDS[name.toUpperCase()];
      if (!coord) return;

      const icon = L.divIcon({
        html: `<div class="tl-pole-marker"></div>`,
        className: '',
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      });

      activeTLMarker = L.marker([coord.lat, coord.lng], { icon })
        .bindPopup(`<b style="color:#5b9cf6">${name}</b><br><span style="font-size:0.75rem">${coord.lat.toFixed(6)}, ${coord.lng.toFixed(6)}</span>`)
        .addTo(map)
        .openPopup();

      map.setView([coord.lat, coord.lng], 19);
    }

    // ── SIDEBAR ────────────────────────────────────────────────────
    function openSidebar(inter) {
      if (activeTLMarker) { map.removeLayer(activeTLMarker); activeTLMarker = null; }
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.remove('hidden');
      document.getElementById('sidebarContent').innerHTML = buildSidebar(inter);
      activateTab('general');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.add('hidden');
    }

    function activateTab(tab) {
      document.querySelectorAll('.stab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
    }

    function chk(val) {
      return val && val !== '' && val !== '0' ? '<span class="check">✔</span>' : '<span class="dash">—</span>';
    }

    function v(val) { return val && val !== '0' ? val : '—'; }

    function buildSidebar(i) {
      const approaches = i.approaches.map(a => `
        <tr>
          <td>${a.num}</td>
          <td>${v(a.direction)}</td>
          <td>${v(a.width)}</td>
          <td>${v(a.traffic)}</td>
          <td>${v(a.turning)}</td>
          <td>${v(a.buslane)}</td>
          <td>${v(a.bikelane)}</td>
          <td>${v(a.bikeway)}</td>
          <td>${v(a.parking)}</td>
          <td>${v(a.buffer)}</td>
          <td>${v(a.tc)}</td>
          <td>${v(a.power)}</td>
          <td>${v(a.internet)}</td>
          <td>${v(a.powerDem)}</td>
          <td>${v(a.intDem)}</td>
          <td>${v(a.railing)}</td>
          <td>${v(a.busStop)}</td>
          <td>${v(a.shelter)}</td>
          <td>${v(a.adPanel)}</td>
          <td>${v(a.panelDim)}</td>
          <td>${v(a.notes)}</td>
        </tr>`).join('');

      const lights = i.trafficLights.map(tl => `
        <tr>
          <td style="text-align:left;"><span class="tl-name-btn" onclick="showTrafficLight('${tl.name}')" title="Click to locate on map">${tl.name}</span></td>
          <td>${v(tl.diameter)}</td>
          <td>${v(tl.height)}</td>
          <td>${v(tl.length)}</td>
          <td>${v(tl.traffic)}</td>
          <td>${v(tl.pedestrian)}</td>
          <td>${v(tl.cycling)}</td>
          <td>${v(tl.singleR)}</td>
          <td>${v(tl.singleY)}</td>
          <td>${v(tl.singleG)}</td>
          <td>${v(tl.countdown)}</td>
          <td>${v(tl.forward)}</td>
          <td>${v(tl.right)}</td>
          <td>${v(tl.left)}</td>
          <td>${v(tl.bus)}</td>
          <td>${v(tl.camera)}</td>
          <td>${v(tl.detector)}</td>
          <td>${v(tl.acoustic)}</td>
          <td>${v(tl.button)}</td>
          <td>${v(tl.sunshade)}</td>
          <td>${v(tl.note)}</td>
        </tr>`).join('');

      const files = i.files.length ? i.files.map(f => `
        <a href="${f.url}" target="_blank" class="file-btn">
          <span class="file-icon">${f.type === 'DWG' ? '📐' : '📄'}</span>
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-type">${f.type} File</div>
          </div>
          <span class="file-arrow">↗</span>
        </a>`).join('')
        : `<div class="empty-panel"><div class="icon">📁</div><p>No files uploaded yet.<br>Add Google Drive links to data.js</p></div>`;

      return `
        <div class="sidebar-header">
          <div>
            <div class="sidebar-id">${i.code}</div>
            <div class="sidebar-name">${i.name}</div>
          </div>
          <button class="sidebar-close" onclick="closeSidebar()">✕ Close</button>
        </div>

        <div class="sidebar-tabs">
          <div class="stab active" data-tab="general" onclick="activateTab('general')">General</div>
          <div class="stab" data-tab="approaches" onclick="activateTab('approaches')">Approaches</div>
          <div class="stab" data-tab="lights" onclick="activateTab('lights')">Lights</div>
          <div class="stab" data-tab="files" onclick="activateTab('files')">Files</div>
        </div>

        <div class="sidebar-body">

          <div class="tab-panel active" id="tab-general">
            <div class="info-card">
              <div class="info-card-title">General Information</div>
              <div class="info-row"><span class="info-key">Code</span><span class="info-val">${i.code}</span></div>
              <div class="info-row"><span class="info-key">Name</span><span class="info-val">${i.name}</span></div>
              <div class="info-row"><span class="info-key">Status</span><span class="info-val"><span class="badge badge-green">${i.status}</span></span></div>
              <div class="info-row"><span class="info-key">Survey Date</span><span class="info-val">${i.date}</span></div>
              <div class="info-row"><span class="info-key">Surveyors</span><span class="info-val">${i.persons}</span></div>
              <div class="info-row"><span class="info-key">Coordinates</span><span class="info-val">${i.lat}, ${i.lng}</span></div>
              <div class="info-row"><span class="info-key">Approaches</span><span class="info-val"><span class="badge badge-yellow">${i.approaches.length}</span></span></div>
              <div class="info-row"><span class="info-key">Traffic Lights</span><span class="info-val"><span class="badge badge-blue">${i.trafficLights.length}</span></span></div>
            </div>
          </div>

          <div class="tab-panel" id="tab-approaches">
            <div class="info-card" style="overflow-x:auto;">
              <div class="info-card-title">Approach Details</div>
              <table class="approaches-table" style="min-width:900px;">
                <thead>
                  <tr>
                    <th>#</th><th>Dir</th><th>Width</th><th>Traffic</th><th>Turning</th>
                    <th>Buslane</th><th>Bikelane</th><th>Bikeway</th><th>Parking</th><th>Buffer</th>
                    <th>TC</th><th>Power</th><th>Internet</th><th>Pwr Dem</th><th>Int Dem</th>
                    <th>Railing</th><th>Bus Stop</th><th>Shelter</th><th>Ad Panel</th><th>Panel Dim</th>
                    <th>Notes</th>
                  </tr>
                </thead>
                <tbody>${approaches}</tbody>
              </table>
            </div>
          </div>

          <div class="tab-panel" id="tab-lights">
            <div class="info-card" style="overflow-x:auto;">
              <div class="info-card-title">Traffic Light Poles</div>
              <table class="tl-table" style="min-width:1000px;">
                <thead>
                  <tr>
                    <th>Name</th><th>Dia.</th><th>H(m)</th><th>Len</th><th>Traffic</th><th>Ped.</th><th>Cycling</th>
                    <th>Sng R</th><th>Sng Y</th><th>Sng G</th><th>Cdwn</th>
                    <th>Fwd</th><th>Right</th><th>Left</th><th>Bus</th>
                    <th>Cam</th><th>Det.</th><th>Acst</th><th>Btn</th><th>Sun</th><th>Note</th>
                  </tr>
                </thead>
                <tbody>${lights}</tbody>
              </table>
            </div>
          </div>

          <div class="tab-panel" id="tab-files">
            <div class="info-card">
              <div class="info-card-title">Documents & CAD Files</div>
              ${files}
            </div>
          </div>

        </div>
      `;
    }
  </script>
</body>
</html>
